<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Paroisse Saint Joseph Mokambo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-church"></i>
                <span>Administration</span>
            </div>
            <nav class="admin-nav">
                <a href="#dashboard" class="active" data-section="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#communiques" data-section="communiques">
                    <i class="fas fa-bullhorn"></i> Communiqués
                </a>
                <a href="#magasin" data-section="magasin">
                    <i class="fas fa-store"></i> Magasin
                </a>
                <a href="index.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Retour au site
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Dashboard Section -->
            <section id="dashboard" class="admin-section active">
                <h2>Tableau de Bord</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-bullhorn"></i>
                        <div class="stat-info">
                            <span class="stat-number">3</span>
                            <span class="stat-label">Communiqués Actifs</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-box"></i>
                        <div class="stat-info">
                            <span class="stat-number">12</span>
                            <span class="stat-label">Articles en Stock</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Communiqués Section -->
            <section id="communiques" class="admin-section">
                <h2>Gestion des Communiqués</h2>
                <div class="admin-form">
                    <form id="communiqueForm">
                        <div class="form-group">
                            <label for="communiqueTitle">Titre du Communiqué</label>
                            <input type="text" id="communiqueTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="communiqueContent">Contenu</label>
                            <textarea id="communiqueContent" rows="5" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="communiqueDate">Date de Publication</label>
                            <input type="date" id="communiqueDate" required>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-save"></i> Publier
                        </button>
                    </form>
                </div>
                <div id="communiques-list" class="admin-list">
                    <!-- Liste des communiqués -->
                </div>
            </section>

            <!-- Magasin Section -->
            <section id="magasin" class="admin-section">
                <h2>Gestion du Magasin</h2>
                <div class="admin-form">
                    <form id="productForm">
                        <div class="form-group">
                            <label for="productName">Nom de l'Article</label>
                            <input type="text" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <textarea id="productDescription" rows="3" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productPrice">Prix (€)</label>
                                <input type="number" id="productPrice" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="productStock">Stock</label>
                                <input type="number" id="productStock" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="productImages">Images de l'Article</label>
                            <input type="file" id="productImages" multiple accept="image/*">
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-plus-circle"></i> Ajouter l'Article
                        </button>
                    </form>
                </div>
                <div id="products-admin-list" class="admin-products-grid">
                    <!-- Grille des produits pour l'administration -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
